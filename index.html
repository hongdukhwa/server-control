<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="서버제어">
  <title>서버제어</title>
  <link rel="manifest" href="manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=17">
</head>
<body>
  <div class="overlay" id="overlay">
    <div class="spinner"></div>
    <div class="overlay-text" id="overlay-text">처리중...</div>
    <div class="overlay-sub" id="overlay-sub">잠시만 기다려주세요</div>
  </div>

  <div class="card">
    <div class="service-row">
      <div class="status-dot checking" id="server-dot"></div>
      <div class="svc-name">Server</div>
      <div id="server-status-text" style="display:none"></div>
      <div class="svc-btns">
        <button class="svc-btn svc-start" id="btn-server-on" onclick="powerOn()" disabled>켜기</button>
        <button class="svc-btn svc-stop" id="btn-server-off" onclick="powerOff()" disabled>끄기</button>
        <button class="svc-btn svc-chk" onclick="checkServerStatus()">확인</button>
      </div>
    </div>
  </div>

  <div class="card">
    
    <div class="vram-bar" id="vram-bar">
      <span>VRAM</span>
      <span id="vram-total">-</span>
      <span id="vram-used">-</span>
      <span id="vram-free">-</span>
    </div>
    <div class="service-row">
      <div class="svc-dot checking" id="nginx-dot"></div>
      <div class="svc-name">Nginx</div>
      <div class="svc-btns">
        <button class="svc-btn svc-start" id="nginx-start" onclick="serviceCtrl('nginx','start','Nginx 시작중...')" disabled>시작</button>
        <button class="svc-btn svc-chk" onclick="serviceCheck('nginx')">확인</button>
      </div>
    </div>
    <div class="service-row">
      <div class="svc-dot checking" id="ollama-dot"></div>
      <div class="svc-name">Ollama</div>
      <div class="svc-btns">
        <button class="svc-btn svc-start" id="ollama-start" onclick="serviceCtrl('ollama','start','Ollama 시작중...')" disabled>시작</button>
        <button class="svc-btn svc-stop" id="ollama-stop" onclick="ollamaStop()" disabled>종료</button>
        <button class="svc-btn svc-chk" onclick="serviceCheck('ollama')">확인</button>
      </div>
    </div>
    <div class="service-row">
      <div class="svc-dot checking" id="openclaw-dot"></div>
      <div class="svc-name">OpenClaw</div>
      <div class="svc-btns">
        <button class="svc-btn svc-start" id="openclaw-start" onclick="serviceCtrl('openclaw','start','OpenClaw 시작중...')" disabled>시작</button>
        <button class="svc-btn svc-stop" id="openclaw-stop" onclick="serviceCtrl('openclaw','stop','OpenClaw 종료중...')" disabled>종료</button>
        <button class="svc-btn svc-chk" onclick="serviceCheck('openclaw')">확인</button>
      </div>
    </div>
  <div class="service-row">
      <div class="svc-dot checking" id="openwebui-dot"></div>
      <div class="svc-name">OpenWebUI</div>
      <div class="svc-btns">
        <button class="svc-btn svc-start" id="openwebui-start" onclick="serviceCtrl('openwebui','start','OpenWebUI 시작중...')" disabled>시작</button>
        <button class="svc-btn svc-stop" id="openwebui-stop" onclick="serviceCtrl('openwebui','stop','OpenWebUI 종료중...')" disabled>종료</button>
        <button class="svc-btn svc-chk" onclick="serviceCheck('openwebui')">확인</button>
      </div>
    </div>
    <div class="service-row">
      <div class="svc-dot checking" id="kokoro-dot"></div>
      <div class="svc-name">Kokoro TTS</div>
      <div class="svc-btns">
        <button class="svc-btn svc-start" id="kokoro-start" onclick="serviceCtrl('kokoro','start','Kokoro 시작중...')" disabled>시작</button>
        <button class="svc-btn svc-stop" id="kokoro-stop" onclick="serviceCtrl('kokoro','stop','Kokoro 종료중...')" disabled>종료</button>
        <button class="svc-btn svc-chk" onclick="serviceCheck('kokoro')">확인</button>
      </div>
    </div>
    <div class="service-row">
      <div class="svc-dot checking" id="fooocus-dot"></div>
      <div class="svc-name">Fooocus API</div>
      <div class="svc-btns">
        <button class="svc-btn svc-start" id="fooocus-start" onclick="serviceCtrl('fooocus','start','Fooocus API 시작중...')" disabled>시작</button>
        <button class="svc-btn svc-stop" id="fooocus-stop" onclick="serviceCtrl('fooocus','stop','Fooocus API 종료중...')" disabled>종료</button>
        <button class="svc-btn svc-chk" onclick="serviceCheck('fooocus')">확인</button>
      </div>
    </div>
    <div class="service-row">
      <div class="svc-dot checking" id="fooocus_ui-dot"></div>
      <div class="svc-name">Fooocus UI</div>
      <div class="svc-btns">
        <button class="svc-btn svc-start" id="fooocus_ui-start" onclick="serviceCtrl('fooocus_ui','start','Fooocus UI 시작중...')" disabled>시작</button>
        <button class="svc-btn svc-stop" id="fooocus_ui-stop" onclick="serviceCtrl('fooocus_ui','stop','Fooocus UI 종료중...')" disabled>종료</button>
        <button class="svc-btn svc-chk" onclick="serviceCheck('fooocus_ui')">확인</button>
      </div>
    </div>
  </div>

  
  </div>

  <script src="app.js?v=17"></script>
</body>
</html>
