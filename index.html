<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="서버제어">
  <title>서버제어</title>
  <link rel="manifest" href="manifest.json">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(160deg, #0d1b4b 0%, #1a2f6e 50%, #0d1b4b 100%);
      color: #fff;
      font-family: -apple-system, 'Noto Sans KR', sans-serif;
      min-height: 100vh;
      padding: 30px 20px;
    }

    .status-bar {
      background: #1c1c2e;
      border-radius: 10px;
      padding: 14px 20px;
      text-align: center;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 1px;
      margin-bottom: 20px;
      border: 1px solid rgba(255,255,255,0.1);
      transition: all 0.3s;
    }
    .status-bar.waiting  { color: #aaa; }
    .status-bar.online   { color: #00e676; border-color: #00e676; }
    .status-bar.offline  { color: #ff5252; border-color: #ff5252; }

    .btn-row {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
    }
    .btn {
      flex: 1;
      padding: 18px 0;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 1px;
      transition: all 0.15s;
    }
    .btn:active { transform: scale(0.96); opacity: 0.85; }

    .btn-on    { background: #e53935; color: #fff; }
    .btn-check { background: #2e7d32; color: #fff; flex: 0.8; font-size: 14px; }
    .btn-off   { background: #1565c0; color: #fff; }

    .divider {
      border: none;
      border-top: 1px solid rgba(255,255,255,0.15);
      margin-bottom: 20px;
    }

    .links { display: flex; flex-direction: column; gap: 12px; }
    .link-btn {
      display: block;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      padding: 18px 20px;
      text-align: center;
      color: #dce3f0;
      font-size: 15px;
      font-weight: 500;
      text-decoration: none;
      letter-spacing: 0.5px;
      transition: all 0.2s;
    }
    .link-btn:active { background: rgba(255,255,255,0.15); }
  </style>
</head>
<body>

  <div class="status-bar waiting" id="status-bar">서버 상태 대기중...</div>

  <div class="btn-row">
    <button class="btn btn-on"    onclick="powerOn()">켜짐</button>
    <button class="btn btn-check" onclick="checkStatus()">서버점검</button>
    <button class="btn btn-off"   onclick="powerOff()">꺼짐</button>
  </div>

  <hr class="divider">

  <div class="links">
    <a href="http://daniel-server.iptime.org:4000" class="link-btn">ERP 프로젝트 데모</a>
    <a href="http://daniel-server.iptime.org:9000" class="link-btn">영어 프로젝트 데모</a>
    <a href="#" class="link-btn">세무 프로젝트 데모</a>
    <a href="#" class="link-btn">경마 프로젝트 데모</a>
  </div>

  <script>
    const TOKEN = "daniel2024!";
    const API = "https://daniel-server.iptime.org/api";
    const GH_TOKEN = 'ghp_' + 'M2mXCZq1AHjquQCkrRgstr2EckxcK74C8Dan';
    const GH_URL = 'https://api.github.com/repos/hongdukhwa/server-control/actions/workflows/main.yml/dispatches';

    const bar = document.getElementById('status-bar');

    function setStatus(state) {
      bar.className = 'status-bar ' + state;
      if (state === 'waiting') bar.textContent = '서버 상태 대기중...';
      if (state === 'online')  bar.textContent = '서버 작동중';
      if (state === 'offline') bar.textContent = '서버 중지중';
    }

    async function checkStatus() {
      setStatus('waiting');
      try {
        const res = await fetch(API + '/status', { signal: AbortSignal.timeout(4000) });
        const data = await res.json();
        setStatus(data.status === 'online' ? 'online' : 'offline');
      } catch(e) {
        setStatus('offline');
      }
    }

    async function powerOn() {
      if (!confirm('서버를 켜시겠습니까?')) return;
      try {
        await fetch(GH_URL, {
          method: 'POST',
          headers: {
            'Authorization': 'token ' + GH_TOKEN,
            'Accept': 'application/vnd.github.v3' + '+json',
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ref: 'main'})
        });
        alert('켜기 신호를 보냈습니다. 잠시 후 서버점검을 눌러 확인하세요.');
      } catch(e) {
        alert('신호 전송 실패');
      }
    }

    async function powerOff() {
      if (!confirm('서버를 끄시겠습니까?')) return;
      try {
        await fetch(API + '/shutdown?token=' + TOKEN);
        setStatus('offline');
      } catch(e) {
        setStatus('offline');
      }
    }
  </script>
</body>
</html>
