<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="서버제어">
  <title>서버제어</title>
  <link rel="manifest" href="manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="overlay" id="overlay">
    <div class="spinner"></div>
    <div class="overlay-text" id="overlay-text">처리중...</div>
    <div class="overlay-sub" id="overlay-sub">잠시만 기다려주세요</div>
  </div>

  <div style="text-align:center; color:rgba(255,255,255,0.3); font-size:11px; margin-bottom:8px;">v2026.04.06.13</div>
  <div class="card">
    <div class="card-title">Server Power</div>
    <div class="power-inner">
      <div class="power-status-row">
        <div class="status-dot checking" id="server-dot"></div>
        <div class="status-text" id="server-status-text">상태 확인중...</div>
      </div>
      <div class="power-btns">
        <button class="btn-on" id="btn-server-on" onclick="powerOn()" disabled>⚡ 켜기</button>
        <button class="btn-check-power" onclick="checkServerStatus()">🔍 확인</button>
        <button class="btn-off" id="btn-server-off" onclick="powerOff()" disabled>🔌 끄기</button>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Services</div>
    <div class="vram-bar" id="vram-bar">
      <span>VRAM</span>
      <span id="vram-total">-</span>
      <span id="vram-used">-</span>
      <span id="vram-free">-</span>
    </div>
    <div class="service-row">
      <div class="svc-dot checking" id="nginx-dot"></div>
      <div class="svc-name">Nginx</div>
      <div class="svc-btns">
        <button class="svc-btn svc-start" id="nginx-start" onclick="serviceCtrl('nginx','start','Nginx 시작중...')" disabled>시작</button>
        <button class="svc-btn svc-chk" onclick="serviceCheck('nginx')">확인</button>
      </div>
    </div>
    <div class="service-row">
      <div class="svc-dot checking" id="ollama-dot"></div>
      <div class="svc-name">Ollama</div>
      <div class="svc-btns">
        <button class="svc-btn svc-start" id="ollama-start" onclick="serviceCtrl('ollama','start','Ollama 시작중...')" disabled>시작</button>
        <button class="svc-btn svc-stop" id="ollama-stop" onclick="ollamaStop()" disabled>종료</button>
        <button class="svc-btn svc-chk" onclick="serviceCheck('ollama')">확인</button>
      </div>
    </div>
    <div class="service-row">
      <div class="svc-dot checking" id="openclaw-dot"></div>
      <div class="svc-name">OpenClaw</div>
      <div class="svc-btns">
        <button class="svc-btn svc-start" id="openclaw-start" onclick="serviceCtrl('openclaw','start','OpenClaw 시작중...')" disabled>시작</button>
        <button class="svc-btn svc-stop" id="openclaw-stop" onclick="serviceCtrl('openclaw','stop','OpenClaw 종료중...')" disabled>종료</button>
        <button class="svc-btn svc-chk" onclick="serviceCheck('openclaw')">확인</button>
      </div>
    </div>
  <div class="service-row">
      <div class="svc-dot checking" id="openwebui-dot"></div>
      <div class="svc-name">OpenWebUI</div>
      <div class="svc-btns">
        <button class="svc-btn svc-start" id="openwebui-start" onclick="serviceCtrl('openwebui','start','OpenWebUI 시작중...')" disabled>시작</button>
        <button class="svc-btn svc-stop" id="openwebui-stop" onclick="serviceCtrl('openwebui','stop','OpenWebUI 종료중...')" disabled>종료</button>
        <button class="svc-btn svc-chk" onclick="serviceCheck('openwebui')">확인</button>
      </div>
    </div>
    <div class="service-row">
      <div class="svc-dot checking" id="comfyui-dot"></div>
      <div class="svc-name">ComfyUI</div>
      <div class="svc-btns">
        <button class="svc-btn svc-start" id="comfyui-start" onclick="serviceCtrl('comfyui','start','ComfyUI 시작중...')" disabled>시작</button>
        <button class="svc-btn svc-stop" id="comfyui-stop" onclick="serviceCtrl('comfyui','stop','ComfyUI 종료중...')" disabled>종료</button>
        <button class="svc-btn svc-chk" onclick="serviceCheck('comfyui')">확인</button>
      </div>
    </div>
  </div>

  
  </div>

  <script src="app.js"></script>
</body>
</html>
